[pytest]
# pytest配置文件

# 测试文件和目录
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# 测试路径
testpaths = tests

# 最小化Python版本
minversion = 7.0

# 命令行选项
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    hardware: 需要硬件的测试
    mock: 使用Mock的测试

# 覆盖率配置
[coverage:run]
source = firmware, mocks
omit = */tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
